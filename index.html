<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Shifumi Blocks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Shifumi Blocks">
      <section class="home-screen screen" id="homeScreen" aria-label="Accueil">
        <div class="home-ambient" aria-hidden="true">
          <div class="crt-grid"></div>
          <div class="code-rain" id="codeRain"></div>
          <div class="falling-blocks">
            <span class="falling-block rock"></span>
            <span class="falling-block paper"></span>
            <span class="falling-block scissors"></span>
            <span class="falling-block rock"></span>
            <span class="falling-block paper"></span>
          </div>
        </div>
        <header class="home-header">
          <div>
            <p class="eyebrow scramble-text" id="homeBootText" data-text="Insert coin">Insert coin</p>
            <h1 class="scramble-text" id="homeTitle" data-text="Shifumi Blocks">Shifumi Blocks</h1>
            <p class="home-prompt scramble-text" id="homePrompt" data-text="Choisis ta partie">Choisis ta partie</p>
          </div>
          <div class="home-mark" aria-hidden="true">
            <span class="mark-token rock"><span class="mark-icon"></span></span>
            <span class="mark-token paper"><span class="mark-icon"></span></span>
            <span class="mark-token scissors"><span class="mark-icon"></span></span>
          </div>
        </header>

        <section class="start-modes" aria-label="Type de partie">
          <button class="start-card" id="startPlacementButton" type="button">
            <span class="start-card-top">
              <span>
                <span class="start-kicker">Mode</span>
                <strong>Placement</strong>
              </span>
              <span class="start-badge">6×8</span>
            </span>
            <span class="start-board placement-preview" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span></span>
              <span></span><span class="rock"></span><span class="rock"></span><span class="rock"></span><span></span><span></span>
              <span></span><span></span><span class="scissors"></span><span></span><span class="paper"></span><span></span>
            </span>
          </button>

          <button class="start-card arcade-card" id="startArcadeButton" type="button">
            <span class="start-card-top">
              <span>
                <span class="start-kicker">Mode</span>
                <strong>Arcade</strong>
              </span>
              <span class="start-badge">Push</span>
            </span>
            <span class="start-board arcade-preview" aria-hidden="true">
              <span></span><span></span><span class="paper"></span><span></span><span></span><span></span>
              <span></span><span class="scissors"></span><span></span><span class="paper"></span><span></span><span></span>
              <span class="rise"></span><span class="rock rise"></span><span class="paper rise"></span><span></span><span class="scissors rise"></span><span class="rise"></span>
            </span>
          </button>
        </section>

        <div class="ad-space" aria-label="Emplacement publicitaire"></div>
      </section>

      <section class="game-screen screen hidden" id="gameScreen" aria-label="Partie">
        <header class="topbar">
          <button class="icon-button" id="homeButton" type="button" aria-label="Accueil">⌂</button>
          <div>
            <p class="eyebrow">Shifumi Blocks</p>
            <h1 id="modeTitle">Placement</h1>
          </div>
          <button class="icon-button" id="restartButton" type="button" aria-label="Recommencer">↻</button>
        </header>

        <section class="stats" aria-label="Statistiques">
          <div>
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span>Combo</span>
            <strong id="comboValue">0</strong>
          </div>
          <div>
            <span>Bouclier</span>
            <strong id="shieldValue">0</strong>
          </div>
        </section>

        <section class="board-panel">
          <div class="board-wrap">
            <div class="board" id="board" aria-label="Plateau de jeu"></div>
            <div class="effects-layer" id="effectsLayer" aria-hidden="true"></div>
            <div class="combo-pop" id="comboPop" aria-live="polite"></div>
          </div>
        </section>

        <section class="hand" aria-label="Bloc actuel">
          <div class="queue">
            <button class="current-piece" id="currentPiece" type="button" aria-label="Bloc actuel"></button>
            <div class="next-pieces" aria-label="Prochains blocs">
              <div class="next-piece" id="nextPieceOne"></div>
              <div class="next-piece" id="nextPieceTwo"></div>
            </div>
          </div>
          <button class="swap-button" id="swapButton" type="button">Échanger</button>
        </section>

        <section class="arcade-meter" id="arcadeMeter" aria-label="Pression arcade">
          <span>Prochaine ligne</span>
          <strong id="riseValue">8</strong>
        </section>

        <div class="ad-space" aria-label="Emplacement publicitaire"></div>
      </section>
    </main>

    <div class="modal hidden" id="gameOverModal" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
      <div class="modal-card">
        <p class="eyebrow">Partie terminée</p>
        <h2 id="gameOverTitle">Score <span id="finalScore">0</span></h2>
        <p id="gameOverReason">Le plateau est plein.</p>
        <div class="modal-actions">
          <button class="primary-button" id="reviveButton" type="button">Revive</button>
          <button class="secondary-button" id="newGameButton" type="button">Nouvelle partie</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
